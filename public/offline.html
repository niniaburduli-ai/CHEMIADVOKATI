<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>ხაზგარეშე — ჩემი იურისტი</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #0f172a;
        color: #e2e8f0;
        font-family: "Noto Sans Georgian", system-ui, -apple-system, Segoe UI,
          Roboto, sans-serif;
        text-align: center;
      }
      .card {
        max-width: 420px;
      }
      .badge {
        width: 88px;
        height: 88px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        background: #1e293b;
        color: #c9a227;
        font-size: 52px;
        font-weight: 700;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: 700;
      }
      p {
        margin: 0 0 24px;
        font-size: 15px;
        line-height: 1.6;
        color: #94a3b8;
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        padding: 12px 28px;
        border-radius: 10px;
        background: #c9a227;
        color: #0f172a;
        font-size: 15px;
        font-weight: 700;
        font-family: inherit;
      }
      button:hover {
        background: #d8b437;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">ჩ</div>
      <h1>ინტერნეტთან კავშირი არ არის</h1>
      <p>
        ვერ დავუკავშირდით სერვერს. შეამოწმეთ ინტერნეტ-კავშირი და სცადეთ ხელახლა.
      </p>
      <button onclick="location.reload()">ხელახლა ცდა</button>
    </div>
  </body>
</html>
